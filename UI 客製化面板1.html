<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Style Login Previewer</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --apple-blue: #007AFF;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* 背景層 */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: 0.5s ease;
        }

        /* 控制面板 - 位於側邊 */
        #controls {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 280px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            z-index: 100;
            font-size: 14px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        input[type="range"] { width: 100%; }

        /* Logo 樣式 */
        #logo-wrapper {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            padding: 0 50px;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        #preview-logo {
            max-width: 100px;
            height: auto;
            transition: transform 0.2s ease;
        }

        /* 登入卡片 - 毛玻璃 */
        #login-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #login-card.hidden {
            opacity: 0;
            transform: translate(-50%, -45%);
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.5);
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            background: var(--apple-blue);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="controls">
        <h3 style="margin-top:0">UI 客製化面板</h3>
        
        <div class="control-group">
            <label>1. 背景圖片</label>
            <input type="file" id="bg-upload" accept="image/*">
        </div>

        <div class="control-group">
            <label>2. Logo 上傳</label>
            <input type="file" id="logo-upload" accept="image/*">
        </div>

        <div class="control-group">
            <label>Logo 位置</label>
            <select id="logo-pos">
                <option value="center">中間</option>
                <option value="flex-start">左側</option>
            </select>
        </div>

        <div class="control-group">
            <label>Logo 大小</label>
            <input type="range" id="logo-size" min="30" max="250" value="100">
        </div>

        <div class="control-group">
            <label>3. 登入卡片顯示</label>
            <input type="checkbox" id="toggle-card" checked> 顯示卡片
        </div>
    </div>

    <div id="logo-wrapper" style="justify-content: center;">
        <img id="preview-logo" src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Logo">
    </div>

    <div id="login-card">
        <h2 style="margin-bottom: 30px; font-weight: 500;">Sign In</h2>
        <input type="text" class="input-field" placeholder="Apple ID">
        <input type="password" class="input-field" placeholder="Password">
        <button class="login-btn">繼續</button>
        <p style="font-size: 12px; color: #555; margin-top: 15px;">忘記密碼？</p>
    </div>

    <script>
        // 背景更換
        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('bg-container').style.backgroundImage = `url(${event.target.result})`;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Logo 更換
        document.getElementById('logo-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview-logo').src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Logo 位置
        document.getElementById('logo-pos').addEventListener('change', function(e) {
            document.getElementById('logo-wrapper').style.justifyContent = e.target.value;
        });

        // Logo 大小
        document.getElementById('logo-size').addEventListener('input', function(e) {
            document.getElementById('preview-logo').style.width = e.target.value + 'px';
        });

        // 顯示/隱藏卡片
        document.getElementById('toggle-card').addEventListener('change', function(e) {
            const card = document.getElementById('login-card');
            if(e.target.checked) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
